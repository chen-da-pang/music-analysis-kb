      MUSIC_FLAMINGO_MAX_NEW_TOKENS: '2048'
      MUSIC_FLAMINGO_AUDIO_CLIP_SECONDS: '240'
      MUSIC_FLAMINGO_OUTPUT_NAME: official_one_smoke
      MUSIC_FLAMINGO_PROMPT: Describe this track in full detail - tell me the genre, tempo, and key, then dive into the instruments,
