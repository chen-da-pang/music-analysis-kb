# CNB Music Flamingo pipeline. Runtime consumers use the promoted immutable Docker Artifact digest.
# Build events publish a unique candidate tag and print its resolved digest for reviewed promotion.
$:
  api_trigger:
  - docker:
      image: docker.cnb.cool/wuyoumusic/moss-music-runner@sha256:a04cdbc02ef0f0958282e7bbf8c3a15b3a3105f4d17c95db88c98d1fc5f3657b
      volumes:
      - music-flamingo-output:/workspace/cache/output:read-write
    runner:
      tags: cnb:arch:amd64:gpu:L40
    env:
      PYTHONUNBUFFERED: '1'
      HF_HUB_ENABLE_HF_TRANSFER: '1'
      HF_HOME: /opt/huggingface
      MUSIC_FLAMINGO_MODEL: nvidia/music-flamingo-think-2601-hf
      MUSIC_FLAMINGO_REVISION: 1ea2109
      MUSIC_FLAMINGO_MODEL_DIR: /opt/models/music-flamingo-think-2601-hf
      CNB_RUNTIME_IMAGE: docker.cnb.cool/wuyoumusic/moss-music-runner@sha256:a04cdbc02ef0f0958282e7bbf8c3a15b3a3105f4d17c95db88c98d1fc5f3657b
      MUSIC_FLAMINGO_MAX_NEW_TOKENS: '2048'
      MUSIC_FLAMINGO_AUDIO_CLIP_SECONDS: '240'
      MUSIC_FLAMINGO_PROMPT: Describe this track in full detail - tell me the genre, tempo, broad tonal center, rhythmic feel,
        instrumentation, vocal character, production style, structure, and overall mood and atmosphere it creates. Focus only
        on audible musical and performance details. Ignore lyrical content entirely and do not mention, summarize, quote,
        or transcribe any lyrics.
      WORK_DIR: /workspace/cache/output/music_flamingo_pipeline
      MUSIC_FLAMINGO_RUN_ID: ${CNB_BUILD_ID}
      MUSIC_FLAMINGO_DETAILED_CUDA_TELEMETRY: '0'
      MUSIC_FLAMINGO_OUTPUT_NAME: one_smoke
    stages:
    - name: Check GPU
      script: bash scripts/check_remote_env.sh
    - name: Pick smoke audio
      script: bash scripts/pick_one_audio.sh
    - name: Verify preloaded Music Flamingo model
      script: python scripts/run_one_music_flamingo_smoke.py verify
    - name: Run one-song Music Flamingo smoke
      timeout: 4h
      script: 'set -eu

        rc=0

        python scripts/run_one_music_flamingo_smoke.py infer || rc=$?

        run_dir="$(python scripts/music_flamingo_run_context.py print-dir)"

        echo "===== model_report.json ====="

        cat "$run_dir/model_report.json" || true

        echo "===== run_report.json ====="

        cat "$run_dir/run_report.json" || true

        echo "===== stdout.txt ====="

        cat "$run_dir/stdout.txt" || true

        echo "===== stdout_raw.txt ====="

        cat "$run_dir/stdout_raw.txt" || true

        echo "===== stderr.txt ====="

        cat "$run_dir/stderr.txt" || true

        exit "$rc"

        '
    - name: Package Music Flamingo run evidence
      script: bash scripts/package_music_flamingo_run.sh
    - name: Upload Music Flamingo run evidence
      image: cnbcool/attachments:latest
      settings:
        attachments:
        - cnb-artifacts/music-flamingo-run.tar.gz
    lock:
      key: music-flamingo-output-writer
      wait: true
      timeout: 15000
      expires: 15000
  api_trigger_official_music_flamingo:
  - docker:
      image: docker.cnb.cool/wuyoumusic/moss-music-runner@sha256:a04cdbc02ef0f0958282e7bbf8c3a15b3a3105f4d17c95db88c98d1fc5f3657b
