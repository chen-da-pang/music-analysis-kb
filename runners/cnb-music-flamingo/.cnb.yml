  api_trigger_model_image:
  - services:
    - docker
    runner:
      tags: cnb:arch:amd64
    env:
      PYTHONUNBUFFERED: '1'
      HF_HUB_ENABLE_HF_TRANSFER: '1'
      MUSIC_FLAMINGO_MODEL: nvidia/music-flamingo-think-2601-hf
