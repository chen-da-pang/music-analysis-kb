    stages:
    - name: Start Dev GPU log viewer
      script: 'set -eu

        run_dir="$(python scripts/music_flamingo_run_context.py print-dir)"

        mkdir -p "$run_dir"

        nohup bash scripts/devgpu_launch.sh > "$run_dir/log_viewer.log" 2>&1 &

        echo "$!" > "$run_dir/log_viewer.pid"

        echo "Log viewer process started on port 8686"

        echo "Log viewer run directory: $run_dir"

        echo "Open port 8686 from the WebIDE PORTS panel."

