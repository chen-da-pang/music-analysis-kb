        echo "===== batch_report.json ====="

        cat "$run_dir/batch_report.json" || true

        echo "===== progress.jsonl tail ====="

        tail -n 80 "$run_dir/progress.jsonl" || true

        echo "===== stderr.txt ====="

        cat "$run_dir/stderr.txt" || true

        exit "$rc"

        '
    - name: Package Music Flamingo run evidence
      script: bash scripts/package_music_flamingo_run.sh
    - name: Upload Music Flamingo run evidence
