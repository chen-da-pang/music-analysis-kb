    stages:
    - name: Build and push Music Flamingo model image
      timeout: 6h
      script: "set -eu\ncandidate_image=\"${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:music-flamingo-cuda-model-candidate-${CNB_BUILD_ID}\"\
        \nprintf '%s\\n' \"candidate_image=${candidate_image}\"\ndocker build \\\n  --label \"org.opencontainers.image.revision=${CNB_BRANCH_SHA:-unknown}\"\
        \ \\\n  --label \"io.wuyoumusic.music_flamingo.model=${MUSIC_FLAMINGO_MODEL}\" \\\n  --label \"io.wuyoumusic.music_flamingo.revision=${MUSIC_FLAMINGO_REVISION}\"\
        \ \\\n  --build-arg MUSIC_FLAMINGO_MODEL=\"${MUSIC_FLAMINGO_MODEL}\" \\\n  --build-arg MUSIC_FLAMINGO_REVISION=\"\
        ${MUSIC_FLAMINGO_REVISION}\" \\\n  --build-arg MUSIC_FLAMINGO_MODEL_DIR=\"${MUSIC_FLAMINGO_MODEL_DIR}\" \\\n  -f .cnb/Dockerfile.flamingo\
        \ \\\n  -t \"$candidate_image\" .\ndocker push \"$candidate_image\"\ncandidate_image_digest=\"$(docker image inspect\
        \ --format '{{index .RepoDigests 0}}' \"$candidate_image\")\"\ncase \"$candidate_image_digest\" in\n  *'@sha256:'*)\
        \ ;;\n  *) echo \"Could not resolve immutable candidate digest for $candidate_image\" >&2; exit 1 ;;\nesac\npython3\
        \ - <<PYTHON\nimport json\nprint(json.dumps({\n    \"candidate_image\": \"${candidate_image}\",\n    \"candidate_image_digest\"\
        : \"${candidate_image_digest}\",\n    \"source_commit\": \"${CNB_BRANCH_SHA:-unknown}\",\n    \"model\": \"${MUSIC_FLAMINGO_MODEL}\"\
        ,\n    \"model_revision\": \"${MUSIC_FLAMINGO_REVISION}\",\n}, ensure_ascii=False, sort_keys=True))\nPYTHON\nprintf\
        \ '%s\\n' \"Promotion is an explicit reviewed update of the immutable runtime image digest in .cnb.yml.\"\n"
  api_trigger_cleanup_moss_image:
