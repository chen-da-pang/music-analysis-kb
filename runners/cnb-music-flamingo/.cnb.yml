      script: |
        set -eu
        echo 'No model, LFS hydrate, campaign planner, or ledger restore is run automatically.'
        echo 'Create an explicit quality selection and isolated quality ledger branch, then run:'
        echo '  bash scripts/devgpu_run_manual_kugou_quality_rerun.sh'
    lock:
      key: music-flamingo-output-writer
      wait: true
      timeout: 15000
      expires: 18000
