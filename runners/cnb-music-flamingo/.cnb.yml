        run_dir="$(python scripts/music_flamingo_run_context.py print-dir)"

        echo "===== model_report.json ====="

        cat "$run_dir/model_report.json" || true

        echo "===== run_report.json ====="

        cat "$run_dir/run_report.json" || true

        echo "===== stdout.txt ====="

        cat "$run_dir/stdout.txt" || true

        echo "===== stdout_raw.txt ====="

        cat "$run_dir/stdout_raw.txt" || true

        echo "===== stderr.txt ====="

        cat "$run_dir/stderr.txt" || true

        exit "$rc"

        '
    - name: Package Music Flamingo run evidence
      script: bash scripts/package_music_flamingo_run.sh
    - name: Upload Music Flamingo run evidence
      image: cnbcool/attachments:latest
      settings:
        attachments:
        - cnb-artifacts/music-flamingo-run.tar.gz
    lock:
